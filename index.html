となった。\n\n歴史の授業で学んできたすべての思想が、この一冊に流れ込んでいる。啓蒙思想、フランス革命、アメリカ独立宣言、そして二度の世界大戦の反省──人類が数百年かけて積み上げた知恵が、この憲法の条文のなかに凝縮されている。", "sf": "ロック・モンテスキュー・ルソーの啓蒙思想がフランス人権宣言（1789年）を経て、約160年の時を超えて日本の最高法規として結実した。思想は時間と空間を超えて旅をする──日本国憲法はそのことの生きた証拠だ。\n\n大日本帝国憲法との対比は、日本近代史の核心的な問いを照らし出す。「主権は天皇か国民か」「軍は国家が持つのか持たないのか」「基本的人権は制限できるのかできないのか」──これらの問いへの真逆の回答が二つの憲法に刻まれている。日本国憲法の第9条（戦争放棄）は世界の憲法に類例のない条文であり、「近代国家は軍事力を持つべきだ」という常識への根本的な問いかけだ。制定から80年近く経た今もこの問いは未解決であり、日本社会が向き合い続ける最も重要な憲法的課題の一つだ。", "dp": "日本国憲法を学ぶときロック、モンテスキュー、ルソーが「自分の日常を支えている人たち」に変わる瞬間がある。人権は空から降ってきたのではない。何世紀もの思想家の格闘と革命の血と戦争の反省の結晶だ。それを知ることが人権の価値を本当に理解するということだ。ハンムラビ法典から日本国憲法まで──全67の書物を読み通したとき、その道のりの壮大さが見えてくるはずだ。\n\nハンムラビ法典から数えて約3800年、人類はどうすれば暴走する力に歯止めをかけられるかを問い続けてきた。日本国憲法はその長い問いへの、今のところの最善の答えだ。それを次の世代に手渡すことが、歴史を学ぶ私たちの責任である。", "x": ""}, {"id": "udhr", "t": "世界人権宣言", "a": "国連総会で採択", "p": "1948年", "e": "showa", "en": "昭和", "y": "宣言", "catch": "「すべての人間は自由で平等」──ホロコーストの灰の中から生まれた宣言。", "st": "第二次世界大戦とホロコースト（＝ナチス・ドイツによるユダヤ人の大量虐殺）への反省から生まれた、人類史上初の「すべての人間の権利」を包括的に宣言した文書。1948年12月10日、国連総会で採択された。\n\n第1条「すべての人間は、生れながらにして自由であり、かつ、尊厳と権利とについて平等である」。フランス人権宣言から約160年、ようやく「すべて」が本当にすべての人間を意味する宣言が生まれた。人種、性別、宗教、国籍を問わず、地球上のあらゆる人に等しく適用される権利の宣言だ。全30条からなり、思想・良心の自由、表現の自由、教育を受ける権利、拷問の禁止など、現代の人権概念の基礎がすべて盛り込まれている。", "sf": "フランス人権宣言が「フランス市民」の権利を、アメリカ独立宣言が「アメリカ人」の権利を語ったのに対し、世界人権宣言は文字通り「すべての人間」の権利を語った。国境を超えた普遍的な人権という概念が、ここで初めて国際的に合意された。\n\n法的拘束力はないが、その後の国際人権法の基礎となり、多くの国の憲法に影響を与えた。現在も世界中で人権侵害が起きているが、「それは人権侵害だ」と指摘できる基準が存在すること自体が、この宣言の功績だ。", "dp": "人権の歴史は一直線の進歩ではない。前進と後退を繰り返しながら少しずつ「すべての人間」の範囲を広げてきた長い道のりだ。世界人権宣言はその到達点のひとつであり、同時に新たな出発点でもある。\n\n現在も世界中で人権侵害が起きている。しかし「それは人権侵害だ」と指摘できる国際的な基準が存在すること自体が、この宣言の最大の功績だ。理想が完全に実現された日はまだ来ていない。しかし理想を書き記したことで、それに向かって歩み続ける道筋ができた。", "x": ""}, {"id": "kokuren", "t": "国際連盟規約／国際連合憲章", "a": "各国代表", "p": "1920年／1945年", "e": "showa", "en": "昭和", "y": "条約", "catch": "1回目の失敗を教訓に、2回目をつくり直した──人類の試行錯誤の記録。", "st": "第一次世界大戦後につくられた国際連盟（1920年〜）と、第二次世界大戦後につくり直された国際連合（1945年〜）。「戦争を防ぐための国際的な仕組み」を人類が二度にわたって設計した記録だ。\n\n国際連盟はアメリカのウィルソン大統領が提唱したが、皮肉なことにアメリカ自身が不参加。軍事制裁の手段をもたず、日本のマンチュリア侵略やイタリアのエチオピア侵攻を止められず、第二次世界大戦の勃発を防げなかった。\n\nその失敗を教訓に設計された国際連合は、安全保障理事会に軍事的強制力を持たせた。ただし常任理事国の拒否権（ひとつの国が反対すれば決議が成立しない制度）という構造的な問題を抱え、冷戦期にはしばしば機能不全に陥った。", "sf": "国際連盟の失敗から国際連合への改良は、人類が「失敗から学ぶ」プロセスの好例だ。一度目の設計（国際連盟）は不完全だった。しかしそこで終わりにせず、二度目の設計（国際連合）でより強力な仕組みをつくった。それでもまだ完璧ではない。国連は今も改革を求められ続けている。\n\n重要なのは「完璧な仕組みが一度で完成する」のではなく、「不完全な仕組みを改良し続ける」というプロセスそのものだ。民主主義もまた同じ──常に未完成であり、改善し続けることが求められる。", "dp": "失敗を認めやり直す。それを繰り返す。人類の歴史は試行錯誤の連続であり、国際連盟から国際連合への道のりはその縮図だ。「失敗した」で終わるのではなく「失敗したからこうする」と考えること──それが歴史から学ぶということだ。\n\n国連もまた完璧ではない。常任理事国の拒否権問題をはじめ多くの課題を抱えている。しかし「完璧でないから無意味だ」ではなく「不完全だからこそ改善し続ける」──この姿勢が、人類が自滅せずに生き延びるための唯一の方法なのかもしれない。", "x": ""},{"id": "magna_carta", "t": "マグナ・カルタ", "a": "イングランド貴族とジョン王", "p": "1215年", "e": "europe", "en": "ヨーロッパ近代", "y": "法典", "catch": "王でも逆らえないルールがある──人権と立憲主義の出発点。", "st": "1215年、イングランド王ジョンは貴族たちに強制されて「マグナ・カルタ（大憲章）」に署名した。全63条からなるこの文書は、それまで国王が当然のように行使していた「税を勝手に課す権利」「人を理由なく逮捕する権利」を制限し、「法の支配」という原則を初めて明文化した歴史的文書だ。\n\n特に重要な条文は「自由人はいかなる者も、同じ身分の者による合法的な裁判または国の法律によらなければ、逮捕・投獄・財産没収・法外追放・追放・またはいかなる方法によっても損害を与えられてはならない」という内容だ。これは現代でいう「適正手続の保障」の原型であり、人身保護法、権利の章典、アメリカ憲法、日本国憲法へと連なる「権利保護」の大河の源流にある。\n\nただし、当初のマグナ・カルタは「自由人」すなわち貴族のみを対象としており、農奴は含まれていなかった。それでも「権力者も法の下に立つ」という原則を文書で確認したことの意義は計り知れない。この文書は何度も再確認・再発行され、後世のイギリス議会主義・民主主義の礎石となった。", "sf": "マグナ・カルタが革命的だったのは「王も法の下に立つ」という原則を文書で確定させたことだ。それ以前の中世ヨーロッパでは王権は神から授かったものとされ、原則として制限されなかった。この文書が示した「権力に対する制限の正当性」という概念は、400年後の名誉革命（1688年）、500年後のフランス革命（1789年）、そしてアメリカ独立宣言（1776年）へと直接つながっていく。\n\n「法の支配（Rule of Law）」という概念──恣意的な権力ではなく、あらかじめ定められたルールが社会を支配するという考え方──は今日の民主主義国家すべての根幹にある。日本国憲法第31条「法定手続きの保障」もその系譜に連なる。一枚の羊皮紙が800年を超えて現代の法の世界に生き続けている。", "dp": "マグナ・カルタが本当に語っているのは「どんな権力も絶対ではない」という人類の信念だ。強者が自分に都合のよいルールを作り放題だった世界に「強者もルールに縛られる」という概念を持ち込んだ。この考え方は現代の「法治主義」「立憲主義」「人権保障」のすべての原点であり、約800年前の羊皮紙の文言が今も世界の法律の根底に流れ続けている。権力への制限という発想がなければ、独裁は今もなお当然のこととして続いていたかもしれない。", "x": "名誉革命・権利の章典とセットで覚える。「王も法の下に立つ＝法の支配」は頻出。立憲主義の源流として記述問題でも重要。"},{"id": "rights_of_englishmen", "t": "権利の章典", "a": "イギリス議会", "p": "1689年", "e": "europe", "en": "ヨーロッパ近代", "y": "法典", "catch": "「次の王様、条件があります」──議会が王冠を授ける瞬間、民主主義が生まれた。", "st": "1688年、イギリスで「名誉革命」が起きた。カトリックへの改宗を進め議会を無視して専制政治を行おうとした国王ジェームズ2世を議会が追放し、オランダから新たにウィリアム3世を招いた。その際、議会は王に「権利の章典（Bill of Rights）」への署名を条件とした。これが世界史上初めて「議会が王に条件を突きつけ、王がそれを認めた」瞬間であり、立憲君主制の始まりだ。\n\n権利の章典の内容は明確だ。「議会の同意なしに法律を停止したり課税したりすることを禁じる」「国民の請願権を保障する」「議会での言論の自由を保障する」「残酷な刑罰の禁止」など、王権を議会の下に置く条文が並ぶ。つまり「王は君臨すれども統治せず」という原則の法的な確立だ。\n\nこれは「流血なき革命（名誉革命）」と呼ばれ、フランス革命やアメリカ独立のように激しい暴力を伴わずに政治体制が変わった稀有な例として教科書で強調される。ジョン・ロックはこの革命を支持し「統治二論」を書いた。そしてこの思想がアメリカ独立宣言、フランス人権宣言へと連鎖していく。", "sf": "権利の章典が歴史を動かした最大の理由は「議会主権」という原則を実現したことだ。王が議会を召集したり解散したり無視したりできた時代が終わり、議会こそが最高の権力機関であるという近代民主主義の骨格が完成した。ロックの「統治二論」（1689年）はこの革命の哲学的正当化であり、「政府は被治者の同意に基づく」という考え方はアメリカ独立宣言に直接引用された。権利の章典→ロック→アメリカ独立宣言→フランス人権宣言というチェーンは中学歴史の核心の一つだ。", "dp": "権利の章典が本当に語っているのは「権力の正当性は被統治者の同意にある」という近代民主主義の根本原理だ。王権神授説（王は神から権力を授かった）という考えを覆し、「国民が権力を与え、国民が権力を取り上げることができる」という考え方を制度として実現した。この瞬間から「民主主義」は理想論ではなく現実の政治制度になった。日本の国会も天皇が「君臨すれども統治せず」という原則も、この1689年の文書から連なる思想の流れにある。", "x": "名誉革命（1688年）＋権利の章典（1689年）はセットで必須。ロックの統治二論と並べて理解する。「議会主権」「立憲君主制」のキーワード。"},{"id": "heliocentric", "t": "天球の回転について", "a": "コペルニクス", "p": "1543年", "e": "europe", "en": "ヨーロッパ近代", "y": "科学", "catch": "地球は動いている──1500年間信じられた常識を、一人の天文学者がひっくり返した。", "st": "1543年、ポーランドの天文学者コペルニクスは死の直前に「天球の回転について」を出版した。この書物が主張したのは「地球は太陽の周りを回っている（地動説）」という、当時の常識を根底から覆す考えだった。それまで1400年以上、プトレマイオスの「天動説（地球が宇宙の中心）」が公式の学説であり、教会もこれを支持していた。\n\nコペルニクスが地動説を唱えた根拠は詳細な天体観測と数学的計算だった。天動説では惑星の動きを説明するために複雑な「周転円」理論が必要だったが、地球が太陽の周りを回ると仮定すれば惑星の動きをよりシンプルに説明できた。「より単純な理論が正しい」という科学的思考の萌芽がここにある。\n\nコペルニクスが生きているうちはこの説への大きな弾圧はなかったが、後にガリレオ・ガリレイが地動説を支持したことで激しい宗教裁判を受けた。「それでも地球は動く」というガリレオの言葉は科学と信仰の対立を象徴する。コペルニクスの革命はケプラー、ガリレオ、ニュートンへと連なり近代科学の土台を作った。これが「科学革命」と呼ばれる知的大変革の始まりだ。", "sf": "「天球の回転について」が歴史を動かした理由は「人間が権威より観察・計算を信頼する」という科学的思考の転換点だったからだ。ルネサンス以前、知識の源泉は聖書と古典の権威だった。コペルニクスは「観察と数学的論理が聖典よりも正確に宇宙を記述できる」ことを示した。これは単なる天文学の話ではなく「知識とは何か」「何を信頼すべきか」という認識論の革命だった。後のガリレオ、ケプラー、ニュートンを経て、現代科学の方法論──観察・仮説・検証──が確立されていく。", "dp": "コペルニクスの書物が本当に語っているのは「常識を疑う勇気」の重要性だ。1400年間信じられていた「地球が宇宙の中心」という常識を覆すには、証拠に基づいて考え抜く知的誠実さが必要だった。これは単なる天文学の話ではない。「権威が言っているから正しい」ではなく「証拠と論理が指し示すから正しい」という考え方の転換──これがすべての近代科学、ひいては近代民主主義（「王が言うから正しい」ではなく「理性と契約で考える」）の精神的土台だ。", "x": "ルネサンス・宗教改革と同時代の「科学革命」として覚える。コペルニクス→ガリレオ→ケプラー→ニュートンの流れが重要。「地動説」と「天動説」の違いは基礎知識。"},{"id": "discourse_on_method", "t": "方法序説", "a": "ルネ・デカルト", "p": "1637年", "e": "europe", "en": "ヨーロッパ近代", "y": "哲学", "catch": "「我思う、ゆえに我あり」──すべてを疑った男が見つけた、唯一の確かなもの。", "st": "1637年、フランスの哲学者・数学者デカルトは「方法序説」を出版した。この書物の核心にある言葉が「我思う、ゆえに我あり（Cogito, ergo sum）」だ。デカルトはこの書物で「確実に正しいと言える知識を見つけるためにはどうすればよいか」という問いに挑んだ。\n\nデカルトの方法は「方法的懐疑」と呼ばれる。疑いうるものはすべて疑い、絶対に疑えないものだけを出発点にしようとした。感覚は騙されることがある。数学的真理でさえ悪魔が錯覚させているかもしれない。しかし「今こうして疑っている自分が存在すること」だけは疑えない──疑うためには思考する「私」が必要だからだ。これが「我思う、ゆえに我あり」の意味だ。\n\nデカルトはまた、精神（思考するもの）と身体（物質的なもの）を完全に分離した「心身二元論」を提唱した。この考えは近代科学の土台となる「物質世界は数学・力学で記述できる客観的な機械である」という世界観を可能にした。人間の精神と物質的な自然界を分けることで、自然界を感情なく客観的に分析する近代科学の視点が開けたのだ。", "sf": "デカルトが近代哲学の父と呼ばれる理由は「権威や伝統ではなく自分自身の理性を知識の唯一の源泉とした」からだ。中世の学問は教会の権威や聖書の解釈が土台だった。デカルトは「聖書がそう言っているから正しい」ではなく「自分の理性が確実に把握できるから正しい」という基準を提示した。この「個人の理性による自律的な思考」こそが啓蒙思想の核心であり、ロック、ルソー、カントへと連なる近代思想の出発点となった。科学革命と哲学革命が同時進行した17世紀に、デカルトは知的変革の中心人物の一人だった。", "dp": "「方法序説」が本当に語っているのは「自分の頭で考えることの尊厳」だ。何百年も蓄積された権威ある知識でさえ、自分の理性で確かめない限り信頼に値しないとデカルトは主張した。これは革命的な宣言だった。中世の人間は「考える前に信じた」。近代の人間は「信じる前に考える」。この転換がルネサンスから始まり啓蒙主義で完成する「個人の自律」という近代的人間観の確立だ。現代の「批判的思考（クリティカルシンキング）」の精神的先祖がデカルトの方法的懐疑にある。", "x": "「我思う、ゆえに我あり」は記述問題頻出。近代哲学の父デカルト。啓蒙思想の流れ（ロック・ルソー・モンテスキュー）の前提として理解する。"},{"id": "goso", "t": "吾妻鏡", "a": "鎌倉幕府", "p": "13世紀末〜14世紀初頭", "e": "kamakura", "en": "鎌倉時代", "y": "記録", "catch": "幕府が自ら書いた日記──武士の政権がどう動いたか、内側から見える公式記録。", "st": "「吾妻鏡（あずまかがみ）」は、鎌倉幕府が編纂した歴史書で、1180年（治承4年）の源頼朝の旗揚げから1266年（文永3年）まで約80年間の幕府の出来事を日記形式で記録した書物だ。「東鑑（あずまかがみ）」とも書く。「吾妻（あずま）」は東国・関東のことで、武士の政権が関東から日本を支配した時代の公式記録といえる。\n\nこの書物には源頼朝が鎌倉に幕府を開く過程、北条氏が実権を握る承久の乱（1221年）の経緯、元寇（1274年・1281年）への対応など、鎌倉時代の主要な出来事が詳細に記述されている。ただし幕府自身が編纂した公式記録であるため、北条氏に都合のよい記述もあり、史料批判が必要だ。\n\n江戸時代の徳川家康がこの書物を愛読し「武家の法度」を定める際に参考にしたと伝えられている。武家政権の先例集として江戸時代にも重要視され、近世の武家法制に影響を与えた。中世日本の政治史・武家社会を知るうえで最も重要な一次資料の一つだ。", "sf": "吾妻鏡が歴史的に重要な理由は、武士が政権を握った最初の時代を「内側から」記録した資料だからだ。それ以前の歴史書は天皇・貴族中心の視点で書かれていた。吾妻鏡は武士の論理、御恩と奉公の関係、裁判の記録など、武家政権独特の仕組みを具体的に伝えている。\n\n特に御成敗式目（1232年）の制定過程や承久の乱（1221年）における北条氏の判断、元寇への対応など、鎌倉時代の政治決定の内側が読み取れる貴重な資料だ。後の徳川家康がこの書物を愛読して江戸幕府の統治の「先例」として参照したことは、武家政権の伝統がいかに重視されたかを示している。幕府が自ら作った記録であるため北条氏寄りの視点があることも史料批判として重要で、「誰が何の目的で書いたか」を問う歴史学の基本姿勢を学ぶ教材にもなる。", "dp": "吾妻鏡が本当に語っているのは「武家政権の誕生とその論理」だ。摂関政治から院政へ、そして武士の時代へ──この日本史上の大転換を当事者の側から記録した書物だ。武士が単なる「戦う道具」から政治の主役へと変わっていく過程を具体的な事件・裁判・人物の動きを通じて伝える。この変化を理解することは、その後500年にわたる武家政権の時代（鎌倉・室町・安土桃山・江戸）がなぜ生まれ、どのような論理で動いたかを理解する出発点になる。", "x": "鎌倉幕府の公式記録。源頼朝の旗揚げから記録。承久の乱・元寇なども収録。北条氏による記述の偏りも史料批判として押さえる。"},{"id": "shobogenzo", "t": "正法眼蔵", "a": "道元", "p": "13世紀（1231年〜）", "e": "kamakura", "en": "鎌倉時代", "y": "宗教", "catch": "「ただ座れ」──禅の真髄は座ることそのものにある、と道元は言った。", "st": "「正法眼蔵（しょうぼうげんぞう）」は、曹洞宗の開祖・道元（1200〜1253）が著した仏教哲学の大著だ。道元は宋（中国）に渡って禅を学び、帰国後に越前（現在の福井県）の永平寺で修行共同体を作り上げた。「正法眼蔵」はその思想の集大成であり、日本語で書かれた最高水準の哲学書の一つとして今日も評価されている。\n\n道元の核心的な教えは「只管打坐（しかんたざ）」──ただひたすら座禅を組むことだ。「悟りを得るために坐禅する」のではなく「坐禅すること自体がすでに悟りである」というのが道元の根本思想だ。目標のための手段ではなく、今この行為そのものに意味と完成がある──この考え方は仏教思想の中でも独特で深遠だ。\n\n「而今山水（にこんさんすい）」「山水経」など、自然と人間の関係を詩的かつ哲学的に描いた章も有名だ。道元の言語感覚は独特で、日本語による思想の深化という点でも日本文化史に重要な位置を占める。鎌倉仏教の中でも禅宗（臨済宗・曹洞宗）は武士文化と深く結びつき、武士の精神的土台の一つとなった。", "sf": "道元と正法眼蔵が歴史的に重要な理由は、鎌倉仏教が単なる「新しい宗派の乱立」ではなく、日本の思想・文化を根底から変えたことを示しているからだ。法然の浄土宗、親鸞の浄土真宗、日蓮の日蓮宗、栄西・道元の禅宗──これらはいずれも複雑な経典の学問を必要とせず「念仏」「座禅」「題目」という単純な修行で救済を約束した。武士・農民・庶民が初めて自分たちの宗教を持った時代だ。禅の精神はその後の茶道、武道、庭園美術など日本文化全般に深く浸透していった。", "dp": "正法眼蔵が本当に語っているのは「今ここに集中する」という生き方の哲学だ。過去を後悔せず、未来を不安がらず、今この瞬間の行為に全力を注ぐ──禅の修行はこの実践だ。武士がこの教えに共鳴したのは、戦場という一瞬一瞬が命に関わる世界で「今ここ」に集中する精神が最も求められたからだろう。現代でいうマインドフルネスの源流もここにある。八百年前の道元の思想が今日のビジネス・スポーツ・医療の世界で再評価されているのは、人間の根本的な問いへの答えを持っているからだ。", "x": "鎌倉仏教の代表として道元（曹洞宗）・親鸞（浄土真宗）・日蓮（日蓮宗）・法然（浄土宗）・栄西（臨済宗）を整理。道元＝永平寺＝只管打坐。"},{"id": "kyogyoshinsho", "t": "教行信証", "a": "親鸞", "p": "13世紀（1224年ごろ）", "e": "kamakura", "en": "鎌倉時代", "y": "宗教", "catch": "悪人こそ救われる──「善人より悪人が先に救われる」という、衝撃の逆転論理。", "st": "「教行信証（きょうぎょうしんしょう）」は浄土真宗の開祖・親鸞（1173〜1262）が著した主著であり、浄土真宗の根本聖典だ。正式名称は「顕浄土真実教行証文類（けんじょうどしんじつきょうぎょうしょうもんるい）」という。親鸞は法然の弟子として念仏の教えを受け継ぎ、さらに独自の深化を遂げた思想家だ。\n\n親鸞の思想の核心は「悪人正機（あくにんしょうき）」だ。「善人でさえ往生できるのだから、悪人はなおさら往生できる」という逆説的な主張だ。ここで「悪人」とは道徳的な悪人ではなく、自分の力で悟りを開く能力がないと自覚している人間のことを指す。阿弥陀仏の救いは自力修行ができる「善人」よりも、自力では何もできないと知っている「悪人（凡夫）」こそが最も必要とする対象だというのだ。\n\n親鸞はまた「肉食妻帯（にくじきさいたい）」すなわち僧侶が肉を食べ妻を娶ることを公言した最初の仏僧だ。「戒律を守って修行できる特別な人」ではなく「ありのままの人間」が救済の対象であるという思想の実践だった。この教えは農民・武士など庶民に広まり、今日でも浄土真宗は日本最大の仏教宗派の一つだ。", "sf": "教行信証と親鸞の思想が歴史を動かした理由は「宗教を特権階級から庶民に開放した」点にある。それまでの仏教は厳しい戒律を守り経典を学べる貴族・学僧のものだった。親鸞は「念仏さえ唱えれば、どんな人間でも阿弥陀仏が救ってくれる」と主張し、修行も学問も戒律も不要とした。農村に広がった一向一揆（浄土真宗の信者による一揆）は戦国時代の政治地図を大きく変えた。加賀（石川県）では約100年間、浄土真宗の信者が支配する「百姓の持ちたる国」が実現したほどだ。", "dp": "教行信証が本当に語っているのは「人間はありのままで価値がある」というメッセージだ。完璧でなくていい、修行ができなくていい、弱くていい──阿弥陀仏の救済はすべての人間に向けられている。この「無条件の受容」の思想は、現代の心理学でいう「無条件の肯定的関心」と重なる。親鸞が八百年前に「自分はダメな存在だと知ることが救済の入り口だ」と言ったことは、完璧主義と自己否定に苦しむ現代人にも深く響く言葉だ。日本最大の仏教宗派が今日もこの思想を受け継いでいる。", "x": "鎌倉仏教。親鸞＝浄土真宗＝悪人正機＝念仏（南無阿弥陀仏）。法然（浄土宗）の弟子。一向一揆との関係も重要。"},{"id": "rissho_ankoku_ron", "t": "立正安国論", "a": "日蓮", "p": "1260年", "e": "kamakura", "en": "鎌倉時代", "y": "宗教", "catch": "「このままでは国が滅ぶ」──幕府に直訴した僧侶の、命がけの警告書。", "st": "「立正安国論（りっしょうあんこくろん）」は日蓮宗の開祖・日蓮（1222〜1282）が1260年に北条時頼（鎌倉幕府の実権者）に提出した意見書だ。タイトルは「正法（正しい仏法＝法華経）を立てることで、国が安らかになる」という意味だ。\n\n日蓮はこの書物で「他の宗派（念仏・禅・律）を信じるから日本に災いが降りかかっている」と主張した。当時の日本は飢饉・疫病・地震・暴風雨が続いており、日蓮はこれを「間違った仏法を信じた報い」と解釈した。そして「このまま続ければ他国からの侵略と国内の反乱が起こる」と警告した。\n\n驚くべきことに、この警告は的中した。1268年に蒙古（モンゴル帝国）から服属を要求する使者が来日し、1274年・1281年に元寇（蒙古の襲来）が実際に起きたのだ。日蓮は自分の予言が当たったとして「立正安国論」の正しさを主張した。しかし幕府は日蓮を危険人物として流刑（伊豆・佐渡）に処した。日蓮は迫害されながらも主張を曲げなかったことで、強烈な信念の宗教家として知られている。", "sf": "立正安国論が歴史的に重要な理由は、宗教が政治に対して「正しいことをせよ」と直言した最初期の例だからだ。当時の僧侶は権力者に保護してもらう立場にあり、権力を批判するのは危険な行為だった。日蓮は命がけで幕府に警告書を提出し、迫害されてもなお主張を続けた。\n\n元寇（1274年・1281年）が実際に起きたことで「日蓮の予言が当たった」とされたが、これはむしろ当時の東アジアの国際情勢を鋭く読んでいた日蓮の情報収集力・分析力の高さを示している。宗教的直観と現実認識が交差した点が日蓮の独自性だ。また「国家と宗教の関係」「正しい宗教と政治の関係」という問いは、今日の政教分離・宗教と民主主義の関係という現代的な問題にも連なる。日蓮の問いかけは形を変えて今も生きている。", "dp": "立正安国論が本当に語っているのは「信念のために行動する覚悟」だ。日蓮は自分の主張が危険であることを知りながら、幕府に直訴した。流刑になっても、処刑されそうになっても、主張を変えなかった。「正しいと信じることを世の中に示す責任がある」という確信に基づく行動だ。宗教的な解釈に同意するかどうかとは別に、信念を持ち命がけで行動した人物の存在は歴史のなかで強烈な印象を残す。日蓮の精神は後の日本民族主義とも結びついていくが、それは原典の意図を超えた後代の解釈だ。", "x": "鎌倉仏教。日蓮＝日蓮宗＝法華経（南無妙法蓮華経）。元寇の予言で有名。幕府への直訴→流刑。法然・親鸞・道元・栄西とともに鎌倉仏教の代表として整理。"},{"id": "taiheiki", "t": "太平記", "a": "不詳（複数の著者）", "p": "14世紀後半", "e": "muromachi", "en": "室町時代", "y": "軍記物語", "catch": "天皇vs武士──南北朝の動乱を、壮大な物語として描いた大長編。", "st": "「太平記」は14世紀、南北朝時代の動乱を描いた大長編軍記物語だ。全40巻、後醍醐天皇による「建武の新政」（1333〜1336年）から南北朝の争い（1336〜1392年）を経て、足利義満の南北朝合一（1392年）までの約60年間の歴史的激動を描いている。題名の「太平記」は「太平を記す」という意味だが、内容は戦乱の嵐そのものだ。\n\n登場人物は楠木正成・新田義貞・足利尊氏・後醍醐天皇など実在の歴史的人物たち。なかでも楠木正成は忠臣の象徴として江戸時代から近代にかけて英雄視された。「七生報国（しちしょうほうこく）」──七回生まれ変わっても国に報いる──という言葉は楠木正成の言葉として伝えられ、明治以降の国家主義に利用された。\n\n太平記は江戸時代に「太平記読み」と呼ばれる芸能が流行し、庶民の娯楽と歴史教育を兼ねた書物として広まった。また「太平記」に登場する軍師・腹黒い謀略家のイメージは後の戦国時代物語にも影響を与えた。南北朝時代という複雑な時代を知るための最も重要な文学的史料だ。", "sf": "太平記が歴史を動かした理由は、それが単なる歴史記録ではなく「誰が正しい統治者か」という問いへの物語的回答だったからだ。天皇が直接政治を行う「建武の新政」の失敗は、朝廷（天皇）と武家（幕府）のどちらが実際に統治能力を持つかという問いを突きつけた。この問いは江戸時代の「大政委任論」（天皇から政治を委任された将軍という理論）に引き継がれ、幕末の「大政奉還」（将軍が政治権力を天皇に返す）まで日本政治の基本的な緊張関係となった。", "dp": "太平記が本当に語っているのは「正義と現実の衝突」だ。後醍醐天皇は「正しい統治を自分が直接行う」と信じて行動したが、現実の政治は武士なしには動かなかった。楠木正成は勝ち目がないとわかっていても天皇への忠義を貫いて死んだ。足利尊氏は裏切り者とも見られながら現実の権力を握った。「正しさ」と「実効性」のどちらを選ぶか──この問いは現代の政治・組織・個人の行動原理にも通じる普遍的テーマだ。南北朝の動乱はこのテーマを最も劇的に示した時代だった。", "x": "南北朝時代の代表的文学。後醍醐天皇・楠木正成・足利尊氏が主要人物。「七生報国」は楠木正成の言葉として有名。建武の新政との関連を押さえる。"},{"id": "sunzi", "t": "孫子", "a": "孫武（孫子）", "p": "紀元前5世紀ごろ", "e": "ancient", "en": "古代文明", "y": "兵法", "catch": "「戦わずして勝つ」──2500年前に書かれた、世界最古の戦略書。", "st": "「孫子（そんし）」は、春秋時代（紀元前5世紀ごろ）の中国に生きた軍事思想家・孫武が著したとされる兵法書だ。全13篇、約6000字という短い書物だが、「知彼知己者、百戦不殆（彼を知り己を知れば、百戦危うからず）」「兵は拙速を聞くも、いまだ巧遅を観ず（戦争は多少拙くても素早く終わらせるべきで、時間がかかる巧みさは意味がない）」など、現代でも通用する知恵が凝縮されている。\n\n孫子の最も重要な主張は「百戦百勝は善の善なるものにあらず、戦わずして人の兵を屈するは善の善なるものなり」──つまり「百回戦って百回勝つことが最善ではなく、戦わずに敵を屈服させることが真の最善だ」ということだ。これは軍事書でありながら「戦争は避けるべきもの」という逆説的な平和主義的メッセージを含む。\n\n孫子は中国・日本のみならず、ナポレオン、毛沢東、現代の経営者に至るまで世界中で読み継がれてきた。日本では武田信玄の「風林火山（疾きこと風の如く…）」はこの書物から取られた言葉だ。論語と並ぶ中国古典の双璧として、東アジア文明圏の思想的基盤を形作った。", "sf": "孫子が歴史を動かした理由は「戦略とは暴力ではなく知恵の問題だ」という考え方を体系化したことにある。単なる「強い軍隊を持てばいい」という発想を超え、情報収集・心理戦・外交・兵站・地形の活用などを総合した「総合的な戦略論」を構築した。これは単に軍事に留まらず、組織の意思決定・競争戦略・交渉術にも応用できる普遍的な知恵として現代でも通用する。論語が「人はどう生きるべきか」を論じたのと並行して、孫子は「集団はどう生き残るべきか」を論じた。", "dp": "孫子が本当に語っているのは「本当の強さとは争いを避ける力にある」というメッセージだ。力で圧倒するのではなく、敵が戦う気力を失うように状況を作り出す──これが孫子の理想だ。「勝てる状況を作ってから戦う」という考え方は、現代のビジネス戦略・交渉術・外交政策の基本でもある。2500年前の思想が現代の経営者・政治家・スポーツ選手に読み継がれているのは、人間集団の動き方という普遍的な問題を扱っているからだ。孔子が個人の倫理を問うたように、孫子は集団の戦略を問うた。", "x": "春秋戦国時代の中国、諸子百家の一つ。「知彼知己百戦不殆」「戦わずして勝つ」は頻出。武田信玄の「風林火山」の出典。論語と並ぶ中国古典として整理。"},{"id": "seiryoki", "t": "青鞜", "a": "平塚らいてう（ほか）", "p": "1911年（明治44年）", "e": "taisho", "en": "大正〜昭和", "y": "文学・思想", "catch": "「元始、女性は太陽であった」──日本初の女性だけの文学誌が放った、宣戦布告。", "st": "「青鞜（せいとう）」は1911年（明治44年）、平塚らいてう（雷鳥）が中心となって創刊した女性だけによる文学誌だ。「元始、女性は太陽であった。真正の人であった。今、女性は月である。他によって生き、他の光によって輝く、病人のような蒼白い顔の月である」という平塚らいてうの創刊の辞は、日本のフェミニズム文学史上最も有名な文章の一つだ。\n\n青鞜社は与謝野晶子・伊藤野枝・福田英子など、明治・大正を代表する女性文学者・思想家が参加した。発行期間は1911年から1916年までの5年間だが、その間に女性の自由恋愛・中絶問題・廃娼運動（公娼制度の廃止）など、当時タブーとされた問題を正面から論じた。当然、世間からは激しい批判と弾圧を受けた。\n\n青鞜の後、平塚らいてうは市川房枝らと「新婦人協会（1920年）」を結成し、女性の参政権獲得運動を本格化させた。この運動は1945年の女性参政権実現（婦人参政権）、日本国憲法での男女平等（第14条）への道を開いた。青鞜はその出発点として日本のフェミニズム史において決定的な意義を持つ。", "sf": "青鞜が歴史を動かした理由は、当時の日本社会で「女性は家に従い、夫に従う存在」とされていた固定観念に対して、女性自身が声を上げた最初の組織的な文化運動だったからだ。明治の「良妻賢母（りょうさいけんぼ）」教育イデオロギーへの正面からの異議申し立てだった。また女性だけで文芸誌を発行・運営するという行為自体が「女性に知的・創造的活動は不向き」という偏見への実践的反論だった。大正デモクラシーの時代背景もあり、青鞜の問題提起は社会的に大きなインパクトを与えた。", "dp": "青鞜が本当に語っているのは「自分の人生を自分で決める権利」だ。「元始、女性は太陽であった」という言葉は「女性はもともと自律した存在だったが、社会のなかで月（他者の光で輝く存在）にされてしまった」という怒りと悲しみと覚悟の宣言だ。この問いは今日もまだ完全には解決されていない。世界経済フォーラムのジェンダーギャップ指数で日本が低位に置かれていることは、青鞜が始めた問いかけが100年以上経った今もなお継続中であることを示している。", "x": "大正時代の女性解放運動の代表。平塚らいてうと「元始、女性は太陽であった」は記述問題頻出。市川房枝→婦人参政権運動→1945年実現の流れで整理。"},{"id": "senchoji", "t": "沈黙の春", "a": "レイチェル・カーソン", "p": "1962年", "e": "showa", "en": "昭和", "y": "科学・思想", "catch": "春なのに鳥が鳴かない──農薬が生態系を壊していると告発した、環境問題の原点。", "st": "1962年、アメリカの海洋生物学者レイチェル・カーソンは「沈黙の春（Silent Spring）」を出版した。この本は、農薬（特にDDT）の無秩序な使用が鳥・魚・昆虫などの生態系を破壊し、春に鳥が鳴かない「沈黙の春」が訪れていると告発したものだ。\n\n当時はアメリカの農薬産業・化学工業が急成長しており「農薬は農業の革命」と讃えられていた。カーソンの本はその常識に正面から挑戦し、農薬が食物連鎖を通じて生態系全体に蓄積・濃縮（生物濃縮）されていく仕組みを科学的・詩的な文体で告発した。化学業界・農業界から激しい反発を受けたが、科学的事実の積み重ねによる主張は社会的に大きな反響を呼んだ。\n\nこの本をきっかけに1960年代のアメリカで環境保護運動が本格化し、1970年には世界初の「アースデー（地球の日）」が開かれた。DDTの使用禁止、アメリカ環境保護庁（EPA）の設立（1970年）、1972年の国連人間環境会議（ストックホルム）など、現代の環境政策の原点にこの一冊がある。日本でも高度経済成長期の公害問題（水俣病・四日市ぜんそく）への関心と重なり、環境保護の思想的基盤となった。", "sf": "沈黙の春が歴史を動かした理由は「経済成長と環境保護のトレードオフ」という現代最大の課題を最初に世界的規模で提示したからだ。それまで「科学・技術の進歩＝善」は疑いなく信じられていた。カーソンは「技術の進歩がもたらす予期せぬ副作用」に目を向けさせた。\n\n化学業界・農業界からの激しい批判を受けながらもカーソンは科学的証拠に基づいて主張を曲げなかった。この姿勢はコペルニクス・ガリレオ以来の「事実に基づいて権威に抗う」科学者の伝統に連なる。DDT禁止・EPA設立・ストックホルム会議（1972年）・気候変動条約へと続く環境政策の流れは、すべてこの一冊から始まった。現代のSDGs・気候変動対策・生物多様性の保護といった課題は、沈黙の春が60年前に提起した問いに対する現在進行形の回答だ。", "dp": "沈黙の春が本当に語っているのは「自然界は人間の都合に合わせて変えてよいものではない」というメッセージだ。人間は自然界の一部であり、生態系の一員だ。生態系を壊すことは自分たちが生きる基盤を壊すことに等しい。この当たり前の事実を科学的に証明し、詩的な文体で届けたカーソンの言葉は、半世紀以上経った今でも気候変動・生物多様性の喪失・マイクロプラスチック汚染に悩む世界に向けて発せられたメッセージのように響く。", "x": "1962年、レイチェル・カーソン。現代の環境問題・環境保護運動の出発点。DDT禁止・EPA設立・ストックホルム会議（1972年）へとつながる流れを整理。日本の公害問題とセットで理解。"},{"id": "sengo_hakusho", "t": "経済白書「もはや戦後ではない」", "a": "経済企画庁", "p": "1956年（昭和31年）", "e": "showa", "en": "昭和", "y": "政府文書", "catch": "「もはや戦後ではない」──たった一行の言葉が、日本人の意識を変えた。", "st": "1956年（昭和31年）、政府の経済企画庁が発行した「経済白書」のなかに「もはや戦後ではない」という一文があった。これは1945年の終戦から11年、焼け野原だった日本経済が戦前の水準を回復したことを宣言した言葉だ。この短い一文は発表当時から大きな話題となり、流行語にもなった。\n\n1956年という年、日本のGDPは確かに戦前のピークを超えた。朝鮮戦争（1950〜1953年）の特需、日本銀行の金融政策、経済産業省（当時は通商産業省）による産業政策が組み合わさって日本経済は急速に回復していた。この白書は「戦後の復興期は終わった。これからは新たな経済発展の段階に入る」という時代認識を示した。\n\nしかしこの一文の真意は単純な楽観論ではなかった。白書の本文をよく読むと「これからは戦後のように『落ちたところから回復する』という成長は期待できない。本当の意味での経済成長には、新しい技術革新と生産性の向上が必要だ」という、むしろ厳しい将来への警告を含んでいた。高度経済成長への転換点を告げた歴史的文書として今日に至るまで語り継がれている。", "sf": "「もはや戦後ではない」という言葉が歴史を動かした理由は、国民の心理的な転換点を示したからだ。1945〜1956年の11年間、日本人の意識は「戦争で失ったものを取り戻す」という後ろ向きの復興にあった。この言葉は「もう復興ではなく、前に進む時代だ」という前向きな意識の転換を宣言した。その後1960年代の高度経済成長（年率10%前後の成長が約20年続いた）は、この宣言の後に実現した。「貧しい戦後」から「豊かな高度成長期」へという日本社会の大転換の象徴的な言葉として歴史に刻まれている。", "dp": "この経済白書が本当に語っているのは「歴史の転換点は自覚されるべきだ」というメッセージだ。人間も社会も、いつまでも「過去の傷」を癒す段階に留まり続けることはできない。ある時点で「もう前を向く時だ」と宣言することが、次の段階への出発点になる。1956年の日本にとって「もはや戦後ではない」はそのような宣言だった。そして同時に「前に進む新しい課題に今こそ向き合え」という挑戦でもあった。歴史上の転換点には必ず「次の段階への覚悟」が必要だということを、この7文字が教えてくれる。", "x": "1956年（昭和31年）経済白書の流行語。高度経済成長（1955〜73年）の始まりの象徴。神武景気・岩戸景気・いざなぎ景気の流れとセットで覚える。日本経済の戦後復興完了の象徴。"},{"id": "kankyoshi", "t": "今昔物語集", "a": "不詳", "p": "12世紀初頭（平安時代末期）", "e": "heian", "en": "平安時代", "y": "説話文学", "catch": "インドから中国から日本まで、1000以上の物語を集めた、平安時代の「世界文学集」。", "st": "「今昔物語集（こんじゃくものがたりしゅう）」は12世紀初頭（平安末期）に成立したとされる説話集だ。「今は昔、……という話がある」という独特の書き出し（今昔）からこの名前がついた。全31巻に約1040話もの説話が収められており、天竺（インド）・震旦（中国）・本朝（日本）の3部構成で世界の物語を集めた壮大な書物だ。\n\n収録されている話は多種多様だ。仏教の教えを示す宗教説話から、武士の武勇談、貴族の恋愛話、盗賊・悪霊の話まで含む。芥川龍之介はこの書物から「羅生門」「藪の中」「地獄変」「芋粥」などの作品の素材を取り、近代文学の傑作に仕上げた。その意味で今昔物語集は800年後の日本文学にも直接影響を与えた古典だ。\n\n特に注目される「本朝世俗部」は平安末期の世相を生き生きと描いており、貴族の雅な世界とはまったく異なる武士・庶民・悪人たちの姿が登場する。枕草子や源氏物語が描かなかった「もう一つの平安時代」を知ることができる貴重な資料だ。平安文学の中でも宮廷文学とは一線を画する、庶民的・写実的な世界が魅力だ。", "sf": "今昔物語集が歴史的に重要な理由は「平安時代の社会の全体像」を記録していることだ。枕草子・源氏物語が上流貴族の洗練された世界を描いたのに対し、今昔物語集は武士・職人・盗賊・農民・僧侶など平安社会のあらゆる層の人々の生き方を記録している。平安末期は武士が台頭し、貴族社会が揺らぎ始めた激動の時代だった。この書物はその時代の社会的多様性と変化を文学として留めている。芥川龍之介が「人間の利己心と生存本能」というテーマを探すためにこの書物に向かったことは示唆的だ。", "dp": "今昔物語集が本当に語っているのは「人間というものの多様さと普遍性」だ。1000を超える話が示すのは、インドでも中国でも日本でも、古代でも中世でも、貴族でも庶民でも、人間は同じように愛し、恐れ、欲張り、助け合い、裏切り合うということだ。芥川龍之介が「羅生門」でこの書物の話を借りて描いたのも「善悪の境界は状況次第で変わる」という人間の普遍的な問題だった。千年前の説話集が今日の文学・映画・漫画に素材を提供し続けているのは、人間の本質に触れているからだ。", "x": "平安末期の説話集。芥川龍之介「羅生門」「藪の中」の原典として有名。インド・中国・日本の3部構成。枕草子・源氏物語とは対照的な「庶民・武士の平安時代」を描く。"},{"id": "okagami", "t": "大鏡", "a": "不詳", "p": "12世紀初頭（平安末期）", "e": "heian", "en": "平安時代", "y": "歴史物語", "catch": "「この世をば我が世とぞ思ふ」──藤原道長の絶頂を描いた、歴史物語の最高傑作。", "st": "「大鏡（おおかがみ）」は平安末期に成立したとされる歴史物語だ。藤原道長（966〜1027）を中心に、藤原氏が権力の頂点を極める摂関政治の全盛期（9世紀末〜11世紀）を描いている。190歳と150歳の二人の老翁が昔話を語り合うという設定で、約150年の宮廷政治史を生き生きと描く。\n\n最も有名な場面は藤原道長が詠んだ「この世をば我が世とぞ思ふ 望月の 欠けたることもなしと思へば」という和歌だ。「この世は自分のためにあるようなものだ。満月のように何一つ欠けたものがない」という、圧倒的な権力を誇示した歌だ。道長はこの時、自分の娘が三人とも天皇の妃になっており、まさに「望月（満月）」の絶頂にいた。\n\n大鏡は単なる賞賛記録ではなく、批判的な視点も持つ。道長の権力集中に対して「これでよいのか」という疑問も散りばめられており、当時の知識人の複雑な心情が読み取れる。四鏡（大鏡・今鏡・水鏡・増鏡）の中で最も文学的価値が高いとされる。平安時代の政治史を理解するための必須資料だ。", "sf": "大鏡が歴史的に重要な理由は、摂関政治という日本独特の政治システムを内側から記録しているからだ。天皇の外戚（天皇の妻の父や兄）として権力を握る摂関政治は、日本史上最も特異な権力構造の一つだ。「権力は武力ではなく婚姻で掌握できる」という藤原氏の戦略を、大鏡は具体的な人物・エピソードとともに描く。また権力の絶頂が必ず衰退の始まりでもあるという「無常観」も貫いており、後の鎌倉時代以降の日本文学に流れる「盛者必衰」の思想の先駆けをなしている。", "dp": "大鏡が本当に語っているのは「権力の絶頂と空虚さ」だ。「この世をば我が世とぞ思ふ」と詠んだ道長も、その死後数十年で藤原氏の権力は武士に奪われた。どんな絶対的な権力も永続しない──この無常の感覚は日本人の美意識・世界観の核心にある「物の哀れ」に通じる。大鏡は権力者の栄光を記録しながら、同時にその儚さをも照らし出している。中学生にとって大鏡が重要な理由は、摂関政治の仕組みを理解するためだけでなく、権力とは何か、絶頂とは何かを考える素材を提供しているからだ。", "x": "平安時代の歴史物語。藤原道長の「この世をば……」の和歌が超頻出。摂関政治の全盛期を描く。今鏡・水鏡・増鏡と合わせて「四鏡」と呼ぶ。"},{"id": "minken_jiyu_ron", "t": "民権自由論", "a": "植木枝盛", "p": "1879年（明治12年）", "e": "meiji", "en": "明治時代", "y": "思想", "catch": "革命する権利がある──自由民権運動が生んだ、日本初の過激な民主主義宣言。", "st": "「民権自由論（みんけんじゆうろん）」は1879年（明治12年）、自由民権運動家・植木枝盛（うえき えもり、1857〜1892）が著した思想書だ。植木は高知県出身で、板垣退助が率いる自由党の主要な理論家だった。この書物はルソーの「社会契約論」やスペンサーの進化論的社会思想を日本に紹介しつつ、天賦人権論（人間は生まれながらに自由・平等の権利を持つ）を日本語で論じた先駆的著作だ。\n\n植木の最も革命的な主張は「抵抗権・革命権」の肯定だ。政府が人民の権利を侵害する場合、人民はその政府に抵抗し、場合によっては打倒する権利を持つ──これはロックの思想の日本版適用だが、明治政府の下でこれを公言することは危険な行為だった。植木はさらに自ら「東洋大日本国国憲案（私擬憲法）」を起草し、主権在民・男女平等・思想の自由などを盛り込んだ。これは1889年の大日本帝国憲法よりも10年早く、はるかに進んだ民主的内容だった。\n\n植木の思想は当時の政府から危険視され、出版物は発禁処分を受けた。しかし自由民権運動の思想的根拠として全国に広まり、明治民主主義の土台を作った。後の大正デモクラシー、戦後の日本国憲法の精神的先行者として今日再評価されている。", "sf": "植木枝盛と民権自由論が歴史を動かした理由は「天皇中心の国家体制に対して、人民主権という対抗原理を日本語で提示した」からだ。当時の明治政府は「天皇が統治する国家」を作ろうとしており、主権在民の思想は危険視された。植木の私擬憲法は、人民が主人公の国家像を描いた。これは1889年の大日本帝国憲法の方向性とは正反対だった。しかし植木の精神は大正デモクラシー（吉野作造の民本主義）を経て、1945年後の日本国憲法として実現した。「遅れた民主主義の先駆者」として、その志は70年後に達成された。", "dp": "民権自由論が本当に語っているのは「自由は与えられるものではなく、勝ち取るものだ」というメッセージだ。植木は「政府が人民の権利を侵害すれば人民は抵抗してよい」と言った。これは単なる理論ではなく、自分たちの権利のために行動することへの呼びかけだ。明治時代に政府の弾圧を受けながらも民権運動が広がったのは、「自分たちに権利があるはずだ」という意識が庶民の中に芽生えたからだ。この「権利意識の覚醒」という植木の遺産は今日の日本社会にも受け継がれている。", "x": "自由民権運動の理論家。板垣退助・自由党との関係。私擬憲法（東洋大日本国国憲案）で主権在民・男女平等を主張。大日本帝国憲法との対比が重要。"}];
const CATS=[
{k:"all",n:"すべて"},
{k:"ancient",n:"古代文明"},
{k:"japan_ancient",n:"日本の古代"},
{k:"heian",n:"平安時代"},
{k:"kamakura",n:"鎌倉時代"},
{k:"muromachi",n:"室町時代"},
{k:"europe",n:"ヨーロッパ近代"},
{k:"edo",n:"江戸時代"},
{k:"meiji",n:"明治時代"},
{k:"taisho",n:"大正〜昭和"},
{k:"showa",n:"昭和"}
];
let cat="all",cur=null,read=[];
try{read=JSON.parse(localStorage.getItem("hrm3")||"[]")}catch(e){}

function init(){
setTimeout(()=>{document.getElementById("sp").classList.add("h");document.getElementById("hd").style.display="";document.getElementById("ml").style.display=""},3200);
rT();rG();uP();
}

function rT(){
const el=document.getElementById("tabs");
const counts={};W.forEach(w=>{counts[w.e]=(counts[w.e]||0)+1});
el.innerHTML=CATS.map(c=>{
const cnt=c.k==="all"?W.length:(counts[c.k]||0);
return '<div class="ctb'+(cat===c.k?' a':'')+'" onclick="sc(\''+c.k+'\')">'+c.n+'<span class="cc">'+cnt+'</span></div>';
}).join("");
}

function sc(c){cat=c;rT();rG()}

function gF(){
const q=document.getElementById("si").value.toLowerCase();
return W.filter(w=>{
const cm=cat==="all"||w.e===cat;
if(!q)return cm;
return cm&&(w.t.toLowerCase().includes(q)||w.a.toLowerCase().includes(q)||w.st.toLowerCase().includes(q)||w.en.includes(q)||w.y.includes(q));
});
}

function filt(){rG()}

function rG(){
const f=gF(),el=document.getElementById("grid");
if(!f.length){el.innerHTML='<div style="text-align:center;padding:3rem;color:var(--warm-gray)">該当する作品が見つかりません</div>';return}
el.innerHTML=f.map(w=>{
return '<div class="sc" data-c="'+w.e+'" onclick="op(\''+w.id+'\')">'+
'<div class="sct"><div class="scn">'+w.t+'</div><div class="sco">'+w.en+'</div></div>'+
'<div class="sch">'+(w.catch||'')+'</div>'+
'<div class="sca">'+w.a+'　'+w.p+'　<span style="opacity:.5">'+w.y+'</span></div>'+
'</div>';
}).join("");
}

let S=W,scrollPos=0;
function op(id){
cur=W.find(w=>w.id===id);if(!cur)return;
S=gF();
scrollPos=window.scrollY;
if(!read.includes(id)){read.push(id);try{localStorage.setItem("hrm3",JSON.stringify(read))}catch(e){}}
uP();
document.getElementById("ml").style.display="none";
document.getElementById("rv").classList.add("a");
rR();
window.scrollTo(0,0);
}

function back(){
document.getElementById("rv").classList.remove("a");
document.getElementById("ml").style.display="";
rG();
setTimeout(()=>window.scrollTo(0,scrollPos),0);
}

function uP(){
const pct=Math.round(read.length/W.length*100);
document.getElementById("pb").style.width=pct+"%";
}

const paras=(txt)=>txt.split('\n\n').map(p=>'<p>'+p+'</p>').join('');

function rR(){
const s=cur,el=document.getElementById("rc"),si=S.indexOf(s);
el.innerHTML=
'<div class="rh">'+
'<div class="rnm">'+s.en+'　'+s.y+'</div>'+
'<h1>'+s.t+'</h1>'+
'<div class="ra">'+s.a+'　　'+s.p+'</div>'+
'</div>'+

'<div class="stx">'+paras(s.st)+'</div>'+

'<div class="sec sec-sf">'+
'<div class="sec-label">歴史を動かした理由</div>'+
'<div class="sec-body">'+paras(s.sf)+'</div>'+
'</div>'+

'<div class="di">'+
'<div class="di-label">この名著が、本当に語っていること</div>'+
paras(s.dp)+
'</div>'+

'<div class="snv">'+
'<button '+(si<=0?'disabled':'')+' onclick="nv('+(si-1)+')">← 前の作品</button>'+
'<button '+(si>=S.length-1?'disabled':'')+' onclick="nv('+(si+1)+')">次の作品 →</button>'+
'</div>';
}

function nv(i){if(i<0||i>=S.length)return;op(S[i].id)}
init();
</script>
</body>
</html>
